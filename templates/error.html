<!DOCTYPE html>
<html>
<head>
    <title>Error - Adaptive Aptitude Learning</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .error-container {
            max-width: 600px;
            width: 100%;
        }
        
        .error-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        
        .error-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }
        
        h2 {
            color: #dc3545;
            margin-bottom: 20px;
            font-size: 28px;
        }
        
        .error-message {
            background: #f8d7da;
            border-left: 5px solid #dc3545;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: left;
            color: #721c24;
            font-size: 16px;
            line-height: 1.6;
        }
        
        .error-suggestion {
            background: #fff3cd;
            border-left: 5px solid #ffc107;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: left;
            color: #856404;
            font-size: 14px;
        }
        
        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 12px 30px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #f8f9fa;
            color: #333;
            border: 2px solid #667eea;
        }
        
        .btn-secondary:hover {
            background: #667eea;
            color: white;
        }
        
        @media (max-width: 768px) {
            .error-card {
                padding: 25px;
            }
            .btn {
                padding: 10px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-card">
            <div class="error-icon">❌</div>
            <h2>Oops! Something Went Wrong</h2>
            
            <div class="error-message">
                {{ error }}
            </div>
            
            <div class="error-suggestion">
                <strong>💡 Suggestions:</strong><br>
                • Check your internet connection<br>
                • Try uploading a different PDF<br>
                • If error persists, go back and try again
            </div>
            
            <div class="btn-group">
                <a href="/dashboard" class="btn btn-primary">📊 Go to Dashboard</a>
                <a href="/" class="btn btn-secondary">🏠 Home</a>
            </div>
        </div>
    </div>
</body>
</html>
